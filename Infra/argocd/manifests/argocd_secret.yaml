    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: git@github.com:ahmadkaleem2/EKS-GitOps-Platform.git
  sshPrivateKey: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    dummykey
    -----END OPENSSH PRIVATE KEY-----
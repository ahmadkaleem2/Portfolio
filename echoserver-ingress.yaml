apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echoserver
  namespace: echoserver
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/subnets: subnet-060e9cc627a6c0548, subnet-02077d0dc5108c9ab
    external-dns.alpha.kubernetes.io/hostname: dev.ahmadkaleem2.link
    # external-dns.alpha.kubernetes.io/hostname: my-app.test-dns.com
spec:
  ingressClassName: alb
  rules:
    - host: dev.ahmadkaleem2.link
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: echoserver
                port:
                  number: 80

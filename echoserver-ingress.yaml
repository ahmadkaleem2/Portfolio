apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echoserver
  namespace: echoserver
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/subnets: subnet-0771666ee0d8bebec, subnet-080f29b0934d4b1fa
    external-dns.alpha.kubernetes.io/hostname: api.ahmadkaleem2.link
    # external-dns.alpha.kubernetes.io/hostname: my-app.test-dns.com
spec:
  ingressClassName: alb
  rules:
    - host: api.ahmadkaleem2.link
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: echoserver
                port:
                  number: 80

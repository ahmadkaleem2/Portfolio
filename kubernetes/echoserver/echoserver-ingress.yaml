apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echoserver

  annotations:
    cert-manager.io/issuer: "letsencrypt-prod"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/subnets: subnet-024172c5b8f6f4444, subnet-06691193c838790d1
    # external-dns.alpha.kubernetes.io/hostname: ahmad.groveops.net
    external-dns.alpha.kubernetes.io/hostname: test.ahmadkaleem2.link
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    kubernetes.io/ingress.class: alb

    # external-dns.alpha.kubernetes.io/hostname: my-app.test-dns.com
spec:
  ingressClassName: alb
  tls:
  - hosts:
    - test.ahmadkaleem2.link
    secretName: letsencrypt-prod-ingress-certificates
  rules:
    # - host: ahmad.groveops.net
    - host: test.ahmadkaleem2.link
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: echoserver
                port:
                  number: 80

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echoserver

  annotations:
    # cert-manager.io/issuer: "letsencrypt-prod"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/subnets: subnet-060aa91b74397f94a, subnet-0466fa89de80fb4c0
    external-dns.alpha.kubernetes.io/hostname: ahmad.groveops.net
    # external-dns.alpha.kubernetes.io/hostname: test.ahmadkaleem2.link
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    service.beta.kubernetes.io/aws-load-balancer-type: alb
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    # kubernetes.io/ingress.class: alb

    # external-dns.alpha.kubernetes.io/hostname: my-app.test-dns.com
spec:
  ingressClassName: alb
  tls:
  - hosts:
    # - test.ahmadkaleem2.link
    - ahmad.groveops.net
    secretName: letsencrypt-prod-ingress-certificates
  rules:
    - host: ahmad.groveops.net
    # - host: test.ahmadkaleem2.link
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echoserver
                port:
                  number: 80

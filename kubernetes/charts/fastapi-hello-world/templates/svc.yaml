{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-svc
  namespace: {{ .Values.namespace.name }}
spec:
  selector:
    app: fastapi-hello-world
  ports:

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-fastapi-hello-world-ingress
  annotations:
{{ toYaml .Values.ingress.annotations | indent 4 }}
spec:
  rules:
{{- range $index, $path := .Values.ingress.paths }}
    - http:
        paths:
          - path: {{ $path.path }}
            pathType: {{ $path.pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-fastapi-hello-world-svc
                port:
                  number: {{ $.Values.service.port }}
{{- end }}
{{- end }}
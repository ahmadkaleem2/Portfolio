apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-for-fluent-bit
  namespace: argocd
spec:
  project: default
  sources:

  # Helm chart source
  - repoURL: https://aws.github.io/eks-charts
    chart: aws-for-fluent-bit
    targetRevision: 0.2.0
    # createNamespace: true
    helm:
      valueFiles:
        - $values/apps/values/fluent-bit.yaml

  # Git repo source for values
  - repoURL: git@github.com:ahmadkaleem2/EKS-GitOps-Platform.git
    targetRevision: main
    ref: values
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: aws-for-fluent-bit

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-for-fluent-bit
  namespace: argocd
spec:
  project: default
  sources:

  # Helm chart source
  - repoURL: https://aws.github.io/eks-charts
    chart: aws/aws-for-fluent-bit
    targetRevision: 0.2.0
    # createNamespace: true
    helm:
      # values: |
      #   vpcId: vpc-08b8891aea7cec453
      #   clusterName: Ahmad-EKS
      #   region: us-east-1
      #   serviceAccount:
      #     create: true
      #     name: aws-load-balancer-controller
      #     annotations:
      #       eks.amazonaws.com/role-arn: arn:aws:iam::387867038403/role/albc-role-Ahmad-EKS
      valueFiles:
        - $values/apps/values/fluent-bit.yaml

  # Git repo source for values
  - repoURL: git@github.com:ahmadkaleem2/EKS-GitOps-Platform.git
    targetRevision: main
    ref: values
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: aws-for-fluent-bit

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

prometheus:
  operators:
    enabled: true
  deployment:
    enabled: true
  prometheusSpec:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: karpenter.sh/nodepool
              operator: DoesNotExist



alertmanager:
  enabled: false

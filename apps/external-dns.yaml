apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default
  sources:

  # Helm chart source
  - repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.14.5
    # createNamespace: true
    helm:

      valueFiles:
        - $values/apps/values/external-dns.yaml

  # Git repo source for values
  - repoURL: git@github.com:ahmadkaleem2/EKS-GitOps-Platform.git
    targetRevision: main
    ref: values
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

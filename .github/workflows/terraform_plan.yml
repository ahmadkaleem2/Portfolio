name: Terraform Plan

on:
  {}
  # push:
  #   branches:
  #   - main  

concurrency: single

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.IAM_ROLE_ARN }} # Change to reflect your IAM role’s ARN
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.7.4

      - name: Initialize Terraform
        run: terraform init

      - name: Set Terraform Workspace
        run: terraform workspace select -or-create prod

      - name: Terraform Validate
        run: terraform validate

      - name: Plan or Apply or Destroy Terraform Configuration
        run: |
            terraform plan -var-file "./Environment/prod.tfvars"

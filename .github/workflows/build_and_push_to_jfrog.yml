name: Maven Build and Push to JFrog

on:
  push:
    branches:
      - main  # adjust as needed
      - release  # add release branch
      - develop
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}  # Replace with your Artifactory URL

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Java and Maven
        uses: actions/setup-java@v4
        with:
          java-version: '19'
          maven-version: '3.6.3'
          distribution: 'temurin'

      # - name: Get Last commit and build maven project with this tag
      #   run: |
      #     sed "s|\${revision}|${{ github.sha }}|" ./java_projects/spring-boot-tutorial-course/student-management-system/pom.xml > ./java_projects/spring-boot-tutorial-course/student-management-system/pom_temp.xml
      #     cd ./java_projects/spring-boot-tutorial-course/student-management-system/
      #     mvn clean install
      #     if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/release" ]]; then
      #       mvn -f ./pom_temp.xml package -P production
      #     else
      #       mvn -f ./pom_temp.xml package -P develop
      #     fi
      #     ls target
      - name: Get Last commit and build maven project with this tag
        run: |
          echo "Creating build"
          cd ./java_projects/spring-boot-tutorial-course/student-management-system/

          mvn --no-transfer-progress external.atlassian.jgitflow:jgitflow-maven-plugin:1.0-m5.1:release-start -DallowSnapshots=true -DreleaseVersion="1.3.13" -DdevelopmentVersion="1.3.13-SNAPSHOT" -Dsquash=true -Doffline=true -DnoReleaseBuild=true -s .mvn/settings.xml

          mvn --no-transfer-progress external.atlassian.jgitflow:jgitflow-maven-plugin:1.0-m5.1:release-finish -Dsquash=true -DnoReleaseBuild=true -DkeepBranch=true -Doffline=true -DallowSnapshots=true -s .mvn/settings.xml

      - name: Setup JFrog CLI and Push to Artifactory
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: latest
        env:
          JF_PROJECT: "student"
          JF_USER: ${{ secrets.username }}
          JF_PASSWORD: ${{ secrets.password }}
          JF_URL: ${{ secrets.ARTIFACTORY_URL }}

      - name: Push Build to Artifactory
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/release" ]]; then
            echo "publishing release"
            artifact_name=$(ls ./java_projects/spring-boot-tutorial-course/student-management-system/target/ | grep RELEASE.jar$)
            echo $artifact_name
            jf rt u --flat "./java_projects/spring-boot-tutorial-course/student-management-system/target/$artifact_name" "student/student-${artifact_name}"
          else
            echo "publishing snapshot"
            artifact_name=$(ls ./java_projects/spring-boot-tutorial-course/student-management-system/target/ | grep SNAPSHOT.jar$)
            echo $artifact_name
            ls "./java_projects/spring-boot-tutorial-course/student-management-system/target/"
            ls "./java_projects/spring-boot-tutorial-course/student-management-system/target/$artifact_name"
            jf rt u --flat "./java_projects/spring-boot-tutorial-course/student-management-system/target/$artifact_name" "student/student-${artifact_name}"
          fi